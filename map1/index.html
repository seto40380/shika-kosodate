<!DOCTYPE html>
<html lang="ja">
<head>

  <title>志賀町トイレ施設マップ</title>

  <!-- Leaflet CSS -->

  <style>
    #map {
      height: 90vh;

</head>

      { name: "みらいとうぶ公園", location: [37.002465, 136.78449], maleToilets: 3, femaleToilets: 2, barrierFree: "有", infantFacility: "有", ostomate: "有", address: "石川県羽咋郡志賀町福野耕500-1 駐車場付近" },

      { name: "志賀町テニスコート", location: [37.018146, 136.768038], maleToilets: 3, femaleToilets: 2, barrierFree: "有", infantFacility: "無", ostomate: "無", address: "石川県羽咋郡志賀町矢蔵谷ラ2-82 管理棟横" },

    ];

    function createPopupContent(fac) {
      return `
      <b>${fac.name}</b><br />
      所在地: ${fac.address}<br />
      男性トイレ総数: ${fac.maleToilets}<br />
      女性トイレ総数: ${fac.femaleToilets}<br />
      バリアフリートイレ: ${fac.barrierFree}<br />
      乳幼児用設備設置トイレ: ${fac.infantFacility}<br />
      オストメイト設置トイレ: ${fac.ostomate}
      `;
    }

    facilities.forEach(fac => {
      L.marker(fac.location)
        .addTo(map)
        .bindPopup(createPopupContent(fac));
    });
  </script>
</body>
</html>
